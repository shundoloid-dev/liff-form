<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>住宅ローン診断</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }
    button {
      background: #06C755;
      color: white;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h2>住宅ローン診断</h2>

<input id="rate" placeholder="金利（%）">
<input id="years" placeholder="残年数">
<input id="loan" placeholder="住宅ローン残高">
<input id="solar" placeholder="太陽光ローン">
<input id="battery" placeholder="蓄電池ローン">
<input id="other" placeholder="その他">
<input id="newCost" placeholder="導入予定金額">

<button onclick="send()">診断する</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
async function send() {
  await liff.init({ liffId: "ここにLIFF_ID" });

  const profile = await liff.getProfile();

  const data = {
    userId: profile.userId,
    rate: document.getElementById("rate").value,
    years: document.getElementById("years").value,
    loan: document.getElementById("loan").value,
    solar: document.getElementById("solar").value,
    battery: document.getElementById("battery").value,
    other: document.getElementById("other").value,
    newCost: document.getElementById("newCost").value
  };

  await fetch("ここにGAS_URL", {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("診断結果をLINEに送信しました！");
  liff.closeWindow();
}
</script>

</body>
</html>
