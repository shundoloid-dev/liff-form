<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>住宅ローン診断</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }
    button {
      background: #06C755;
      color: white;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h2>住宅ローン診断</h2>

<input id="rate" placeholder="金利（%）">
<input id="months" placeholder="残年数（ヶ月）">
<input id="loan" placeholder="住宅ローン残高">
<input id="solar" placeholder="太陽光ローン残高">
<input id="otherLoan" placeholder="蓄電池などその他ローン残高">
<input id="newCost" placeholder="導入予定金額">

<button onclick="send()">診断する</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
async function send() {
  await liff.init({ liffId: "2009626975-Vz6EeQLF" });

  const profile = await liff.getProfile();

  const data = {
    userId: profile.userId,
    rate: document.getElementById("rate").value,
    months: document.getElementById("months").value,
    loan: document.getElementById("loan").value,
    solar: document.getElementById("solar").value,
    otherLoan: document.getElementById("otherLoan").value,
    newCost: document.getElementById("newCost").value
  };

  await fetch("https://script.google.com/macros/s/AKfycbzjWC7UmbMxqhrIgW2aE31w4SGKnydrrqnxpJhuImv7vdiAao8d_A6gz8gcbrCOC2-v/exec", {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("診断結果をLINEに送信しました！");
  liff.closeWindow();
}
</script>

</body>
</html>
